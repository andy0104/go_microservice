name: User Microservice Audit
on:
  pull_request:
    branches: ["development"]
    paths: ["user_service/**"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Setup Golang
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'

    - name: Verify Dependencies
      run: cd user_service && go mod verify

    - name: Build User Service
      run: cd user_service && go build -v ./...

    - name: Go Vet
      run: cd user_service && go vet -v ./...

    - name: Install Staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest

    - name: Run Static Check
      run: cd user_service && staticcheck ./...

    - name: Run Test
      run: cd user_service && go test -v ./tests/...
