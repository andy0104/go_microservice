name: Build & Deploy User Service
on:
  push:
    branches: ["development"]
    paths: ["user_service/**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Google Cloud Cli
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_APPLICATION_CREDENTIALS }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Authenticate Docker
        run: gcloud auth configure-docker asia-south2-docker.pkg.dev

      - name: Build & Tag Docker Image
        env:
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          cd user_service
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          IMAGE_NAME=asia-south2-docker.pkg.dev/$GOOGLE_PROJECT/gomicroservice-user-service/user-service
          docker build -t $IMAGE_NAME:$TIMESTAMP ./infra/
          docker tag $IMAGE_NAME:$TIMESTAMP $IMAGE_NAME:latest          
          docker push IMAGE_NAME:latest
