version: "3"

services:
  gomicroservicepg:
    image: postgres:16.4-alpine3.20
    ports:
      - 54321:5432
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=root
      - POSTGRES_DB=gomicroservicedb
    volumes:
      - gomicroservice-db:/var/lib/postgresql/data

volumes:
  gomicroservice-db:
